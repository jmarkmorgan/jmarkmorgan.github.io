title: "Wish Upon a Fish"
lang: "en-US"
baseurl: ""
url: "https://wishuponafish.org"
domain: "wishuponafish.org"
description: "Wish Upon a Fish is a US-based nonprofit that transforms invasive carp into shelf-stable fish protein powder to nourish women and children facing malnutrition."
email: "contact@wishuponafish.org"
logo: "/assets/img/logo-dark.webp"

# Build settings
markdown: kramdown
#permalink: /news/:year/:month/:day/:title/
permalink: /news/:title/
sass:
  style: compressed
  sass_dir: _sass
  # Enable source maps in development, disable in production
  sourcemap: never # Valid values: 'development' (default), 'always', 'never'
  

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2
  - jekyll-watch
  - jekyll-toc

# TOC Settings for documentation
toc:
  min_level: 2
  max_level: 3
  list_class: 'list-unstyled fs-sm lh-sm text-reset'
  sublist_class: 'list-unstyled pt-2 ps-2 fs-sm lh-sm text-reset'
  item_class: 'nav-link scroll'
  item_prefix: 'snippet-'
  ordered: false
  no_toc_section_class: 'no-toc'
  numbered_items: true
  auto_ids: true
  sanitize: false

# Pagination
pagination:
  enabled: true
  debug: false
  collections:
    - name: 'posts'
      per_page: 6
      permalink: '/news/page:num/'
      title: ':title - Page :num'

# Collections
collections:
  authors:
    output: true
    permalink: /authors/:path/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      featured_image: "/assets/img/photos/orange-fish.webp"

# Exclude from processing and watching
exclude:
  - 404.html
  - Gemfile
  - Gemfile.lock
  - index.markdown
  - node_modules
  - vendor
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - README.md
  - package.json
  - package-lock.json
  - yarn.lock
  - tmp
  - .git
  - .github
  - .vscode

# LiveReload settings
livereload_max_delay: 5
livereload_min_delay: 3

# Tags settings
tag_page_layout: blog/tag_page
tag_page_dir: tag

# Archive settings
jekyll-archives:
  enabled:
    - year
    - month
    - tags
    - categories
  layouts:
    year: blog/archive-year
    month: blog/archive-month
    tag: blog/archive-tag
    category: blog/archive-category
  permalinks:
    year: '/news/:year/'
    month: '/news/:year/:month/'
    tag: '/news/tag/:name/'
    category: '/news/category/:name/'
