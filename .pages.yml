media: assets/img/photos

settings:
  content:
    merge: true

content:
  - name: news
    label: News
    type: collection
    path: _posts
    format: yaml-frontmatter
    subfolders: false
    view:
      primary: title
      fields: [ title, date, category ]
      sort: [ date, title ]
      default:
        sort: date
        order: desc
    fields:
      - name: layout
        type: string
        hidden: true
        default: post
      - name: author
        type: string
        hidden: true
        default: Mark Morgan
      - name: title
        label: Title
        description: The title people will see on the News page and on the post itself.
        type: string
        required: true
      - name: date
        label: Publish Date
        description: Use the date you want shown on the News page.
        type: date
        required: true
      - name: last_modified
        hidden: true
        type: date
      - name: category
        label: Type
        description: Pick the type that best matches this post.
        type: select
        required: true
        default: Article
        options:
          creatable: true
          values:
            - Article
            - Book
            - Podcast
            - Design
      - name: news_order
        label: Display Order
        description: Smaller numbers appear first on the News page. For a brand new top story, use 0.
        type: number
        required: true
      - name: excerpt
        label: Short Summary
        description: A short paragraph shown on the News page card.
        type: text
        required: true
      - name: featured_image
        label: News Card Image
        description: This image appears on the News page card. New posts start with the default fish image, so you can save first and upload a custom image later.
        type: image
        default: /assets/img/photos/orange-fish.webp
        required: true
      - name: header_image
        label: Top Banner Image
        description: Optional. Usually leave this empty to use the standard orange-fish banner.
        type: image
      - name: tags
        label: Tags
        description: Optional. Add a few short tags to help organize the post.
        type: select
        list: true
        options:
          creatable: true
          values:
            - Asian Carp
            - Invasive Species
            - Children's Book
            - Food Security
            - Humanitarian Aid
            - Haiti
            - Food Preservation
            - Podcast
            - Conservation
            - Gastronomy
            - Sustainable Food
            - Missouri
            - Food Innovation
            - Nutrition
            - Consumer Perception
            - Missouri Anglers
            - Food Neophobia
      - name: body
        label: Story Text
        description: Write the full post here using the visual editor. Use normal paragraphs, headings, lists, and links.
        type: rich-text
        options:
          path: assets/img/photos
      - name: podcast_embed_url
        label: Podcast Embed URL
        description: "Optional. Paste the podcast player's embed URL only, not the full iframe HTML. Example: a Spotify or Apple Podcasts embed link."
        type: string
